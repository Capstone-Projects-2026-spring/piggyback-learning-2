openapi: 3.1.0
info:
  title: backend
  description: ''
  license:
    name: ''
  version: 0.1.0
paths:
  /api/answers/analyze:
    post:
      tags:
        - answers
      operationId: analyze_answer
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AnswerAnalyzeRequest'
        required: true
      responses:
        '200':
          description: Answer analyzed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnswerAnalyzeResponse'
        '400':
          description: Missing or invalid fields
  /api/answers/{kid_id}/{video_id}:
    get:
      tags:
        - answers
      operationId: get_answers
      parameters:
        - name: kid_id
          in: path
          description: Kid ID
          required: true
          schema:
            type: integer
            format: int32
          example: 1
        - name: video_id
          in: path
          description: Video ID
          required: true
          schema:
            type: string
          example: l2FQ8ni1MfM
      responses:
        '200':
          description: Answer found or null
          content:
            application/json:
              schema:
                oneOf:
                  - type: 'null'
                  - $ref: '#/components/schemas/Model'
  /api/auth/login:
    post:
      tags:
        - auth
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginData'
        required: true
      responses:
        '200':
          description: Logged in successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Invalid credentials or role
  /api/auth/signup:
    post:
      tags:
        - auth
      operationId: signup
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupData'
        required: true
      responses:
        '200':
          description: Signed up successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSuccessResponse'
        '400':
          description: Invalid role or missing parent_id for kid
  /api/frames/extract/{video_id}:
    get:
      tags:
        - frames
      operationId: extract_frames
      parameters:
        - name: video_id
          in: path
          description: Video ID
          required: true
          schema:
            type: string
          example: l2FQ8ni1MfM
      responses:
        '200':
          description: Frames extracted or already exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtractFramesResponse'
        '400':
          description: FFMPEG failed
  /api/kids/{kid_id}/recommendations:
    get:
      tags:
        - kids
      operationId: get_recommendations
      parameters:
        - name: kid_id
          in: path
          description: Kid ID
          required: true
          schema:
            type: integer
            format: int32
          example: 1
      responses:
        '200':
          description: Recommended videos based on kid's tags
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecommendationsResponse'
  /api/kids/{kid_id}/tags:
    get:
      tags:
        - kids
      operationId: get_kid_tags
      parameters:
        - name: kid_id
          in: path
          description: Kid ID
          required: true
          schema:
            type: integer
            format: int32
          example: 1
      responses:
        '200':
          description: Tags for the kid
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TagResponse'
    post:
      tags:
        - kids
      operationId: add_kid_tags
      parameters:
        - name: kid_id
          in: path
          description: Kid ID
          required: true
          schema:
            type: integer
            format: int32
          example: 1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddTagsRequest'
        required: true
      responses:
        '200':
          description: Tags added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSuccessResponse'
        '500':
          description: Unknown error occurred
  /api/kids/{kid_id}/videos_assigned:
    get:
      tags:
        - kids
      operationId: get_video_assignments
      parameters:
        - name: kid_id
          in: path
          description: Kid ID
          required: true
          schema:
            type: integer
            format: int32
          example: 1
      responses:
        '200':
          description: Videos assigned to the kid
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Model'
    post:
      tags:
        - kids
      operationId: create_video_assignment
      parameters:
        - name: kid_id
          in: path
          description: Kid ID
          required: true
          schema:
            type: integer
            format: int32
          example: 1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVideoAssignmentRequest'
        required: true
      responses:
        '200':
          description: Video assigned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSuccessResponse'
        '500':
          description: Unknown error occurred
  /api/openai/{video_id}:
    get:
      tags:
        - openai
      operationId: generate_questions
      parameters:
        - name: video_id
          in: path
          description: Video ID
          required: true
          schema:
            type: string
          example: l2FQ8ni1MfM
        - name: start
          in: query
          description: Start of the segment in seconds
          required: true
          schema:
            type: integer
            format: int32
          example: 0
        - name: end
          in: query
          description: End of the segment in seconds
          required: true
          schema:
            type: integer
            format: int32
          example: 60
      responses:
        '200':
          description: Questions generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestionsResponse'
        '500':
          description: Unknown error occurred
  /api/parents/{parent_id}/kids:
    get:
      tags:
        - parents
      operationId: get_kids
      parameters:
        - name: parent_id
          in: path
          description: Parent ID
          required: true
          schema:
            type: integer
            format: int32
          example: 1
      responses:
        '200':
          description: Kids belonging to the parent
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Model'
  /api/questions/{video_id}:
    get:
      tags:
        - questions
      operationId: get_questions_by_video
      parameters:
        - name: video_id
          in: path
          description: Video ID
          required: true
          schema:
            type: string
          example: l2FQ8ni1MfM
      responses:
        '200':
          description: Questions grouped by segment for the video
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoQuestionsResponse'
  /api/tags:
    get:
      tags:
        - tags
      operationId: get_tags
      responses:
        '200':
          description: All tags
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Model'
    post:
      tags:
        - tags
      operationId: create_tag
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTagRequest'
        required: true
      responses:
        '200':
          description: Tag created or returned if already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Model'
  /api/videos/download/{video_id}:
    get:
      tags:
        - videos
      operationId: download_and_store
      parameters:
        - name: video_id
          in: path
          description: Video ID
          required: true
          schema:
            type: string
          example: l2FQ8ni1MfM
      responses:
        '200':
          description: Video downloaded or already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSuccessResponse'
        '500':
          description: Download failed
  /api/videos/{video_id}/tags:
    get:
      tags:
        - videos
      operationId: get_video_tags
      parameters:
        - name: video_id
          in: path
          description: Video ID
          required: true
          schema:
            type: string
          example: l2FQ8ni1MfM
      responses:
        '200':
          description: Tags for the video
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TagResponse'
    post:
      tags:
        - videos
      operationId: add_video_tags
      parameters:
        - name: video_id
          in: path
          description: Video ID
          required: true
          schema:
            type: string
          example: l2FQ8ni1MfM
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddTagsRequest'
        required: true
      responses:
        '200':
          description: Tags added to video
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSuccessResponse'
        '500':
          description: Unknown error occurred
  /ws:
    get:
      tags:
        - websocket
      operationId: ws_handler
      parameters:
        - name: username
          in: query
          description: Username to identify the WebSocket connection
          required: true
          schema:
            type: string
          example: john_doe
      responses:
        '101':
          description: WebSocket connection established
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WsMessage'
        '400':
          description: Bad request
components:
  schemas:
    AccountType:
      oneOf:
        - $ref: '#/components/schemas/Model'
        - $ref: '#/components/schemas/Model'
    AddTagsRequest:
      type: object
      required:
        - tags
      properties:
        tags:
          type: array
          items:
            type: integer
            format: int32
    Answer:
      type: object
      required:
        - transcript
        - is_correct
        - similarity_score
        - mood
        - energy
        - segment_id
      properties:
        energy:
          type: number
          format: float
        is_correct:
          type: boolean
        mood:
          type: string
        segment_id:
          type: integer
          format: int32
        similarity_score:
          type: number
          format: float
        transcript:
          type: string
    AnswerAnalyzeRequest:
      type: object
      required:
        - audio
        - expected_answer
        - kid_id
        - video_id
        - segment_id
      properties:
        audio:
          type: array
          items:
            type: integer
            format: binary
            minimum: 0
          contentMediaType: audio/wav
        expected_answer:
          type: string
        kid_id:
          type: integer
          format: int32
        segment_id:
          type: integer
          format: int32
        video_id:
          type: string
    AnswerAnalyzeResponse:
      type: object
      required:
        - transcript
        - is_correct
        - similarity_score
        - mood
        - energy
      properties:
        energy:
          type: number
          format: float
        is_correct:
          type: boolean
        mood:
          type: string
        similarity_score:
          type: number
          format: float
        transcript:
          type: string
    CreateTagRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
    CreateVideoAssignmentRequest:
      type: object
      required:
        - video_id
      properties:
        video_id:
          type: string
    ExtractFramesResponse:
      type: object
      required:
        - success
        - msg
      properties:
        msg:
          type: string
        success:
          type: boolean
    FollowUp:
      type: object
      required:
        - question
        - answer
      properties:
        answer:
          type: string
        question:
          type: string
    GenericSuccessResponse:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
    LoginData:
      type: object
      required:
        - username
        - password
        - role
      properties:
        password:
          type: string
        role:
          type: string
        username:
          type: string
    LoginResponse:
      type: object
      required:
        - success
        - token
        - role
        - account
      properties:
        account:
          $ref: '#/components/schemas/AccountType'
        parent_username:
          type:
            - string
            - 'null'
        role:
          type: string
        success:
          type: boolean
        token:
          type: string
    Model:
      type: object
      required:
        - created_at
        - updated_at
        - id
        - name
      properties:
        created_at:
          type: string
          format: date-time
          example: '2026-01-15T10:30:00Z'
        id:
          type: integer
          format: int32
        name:
          type: string
        updated_at:
          type: string
          format: date-time
          example: '2026-01-15T10:30:00Z'
    QuestionItem:
      type: object
      required:
        - id
        - qtype
        - question
        - answer
      properties:
        answer:
          type: string
        followup_enabled:
          type:
            - boolean
            - 'null'
        followup_for_correct_answer:
          oneOf:
            - type: 'null'
            - $ref: '#/components/schemas/FollowUp'
        followup_for_wrong_answer:
          oneOf:
            - type: 'null'
            - $ref: '#/components/schemas/FollowUp'
        id:
          type: integer
          format: int32
        qtype:
          type: string
        question:
          type: string
        rank:
          type:
            - integer
            - 'null'
          format: int32
    QuestionsResponse:
      type: object
      required:
        - segment
        - questions
      properties:
        questions:
          type: array
          items:
            $ref: '#/components/schemas/QuestionItem'
        segment:
          $ref: '#/components/schemas/SegmentResponse'
    RecommendationsResponse:
      type: object
      required:
        - tags
        - recommendations
      properties:
        recommendations:
          type: array
          items:
            $ref: '#/components/schemas/RecommendedVideo'
        tags:
          type: array
          items:
            type: string
    RecommendedVideo:
      type: object
      required:
        - id
        - score
      properties:
        duration_seconds:
          type:
            - integer
            - 'null'
          format: int32
        id:
          type: string
        score:
          type: integer
          format: int64
        thumbnail_url:
          type:
            - string
            - 'null'
        title:
          type:
            - string
            - 'null'
    SegmentResponse:
      type: object
      required:
        - id
        - video_id
        - start_seconds
        - end_seconds
      properties:
        best_question:
          type:
            - string
            - 'null'
        end_seconds:
          type: integer
          format: int32
        id:
          type: integer
          format: int32
        start_seconds:
          type: integer
          format: int32
        video_id:
          type: string
    SegmentWithQuestions:
      type: object
      required:
        - id
        - start_seconds
        - end_seconds
        - questions
      properties:
        best_question:
          type:
            - string
            - 'null'
        end_seconds:
          type: integer
          format: int32
        id:
          type: integer
          format: int32
        questions:
          type: array
          items:
            $ref: '#/components/schemas/QuestionItem'
        start_seconds:
          type: integer
          format: int32
    SignupData:
      type: object
      required:
        - name
        - username
        - password
        - role
      properties:
        name:
          type: string
        parent_id:
          type:
            - integer
            - 'null'
          format: int32
        password:
          type: string
        role:
          type: string
        username:
          type: string
    TagResponse:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int32
        name:
          type: string
    VideoQuestionsResponse:
      type: object
      required:
        - video_id
        - segments
      properties:
        segments:
          type: array
          items:
            $ref: '#/components/schemas/SegmentWithQuestions'
        video_id:
          type: string
    WsMessage:
      type: object
      required:
        - sender
        - receiver
        - action
        - msg
      properties:
        action:
          type: string
        msg:
          type: string
        receiver:
          type: string
        sender:
          type: string
tags:
  - name: auth
    description: Auth endpoints
  - name: answers
    description: Answer endpoints
  - name: frames
    description: Frame extraction endpoints
  - name: kids
    description: Kid endpoints
  - name: openai
    description: OpenAI endpoints
  - name: parents
    description: Parent endpoints
  - name: questions
    description: Question endpoints
  - name: tags
    description: Tag endpoints
  - name: videos
    description: Video endpoints
  - name: websocket
    description: Real-time messaging via WebSocket
